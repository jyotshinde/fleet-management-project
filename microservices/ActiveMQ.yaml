apiVersion: v1
kind: Pod
metadata:
  name: queue-app
  labels:
    type: queue
spec:
  containers:
    - name: webapp
      image: richardchesterwood/k8s-fleetman-queue:release1
---
apiVersion: v1
kind: Service
metadata:
  name: queue-service
  labels:
    type: queue-service 
spec:
  selector:
    type: queue
  type: NodePort
  ports:
    - name: http
      port: 8161
      nodePort: 30010
    - name: endpoint
      port: 61616